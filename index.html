<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wayne Manor | Beta 0.52</title>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 15px;
      overflow-x: hidden;
    }

    .gallery-header {
      text-align: center;
      padding: 50px 0 40px 0;
      border-bottom: 1px solid #111;
      margin-bottom: 30px;
    }

    .hero-title {
      font-size: 1.4rem;
      letter-spacing: 6px;
      margin-bottom: 10px;
      font-weight: 300;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 2px;
    }

    .masonry-container {
      column-count: 2;
      column-gap: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .masonry-container { column-count: 3; }
    }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 15px;
      background-color: #080808;
      border-radius: 4px;
      overflow: hidden;
      animation: fadeIn 1s ease-out;
      cursor: zoom-in;
      transition: all 0.3s ease;
    }

    .photo-card img {
      width: 100%;
      display: block;
      filter: contrast(1.1);
    }

    .photo-desc {
      padding: 10px;
      font-size: 0.75rem;
      color: #666;
      line-height: 1.4;
      letter-spacing: 1px;
      text-align: center;
    }

    #lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #000000;
      align-items: center;
      justify-content: center;
      animation: cinematicIn 0.4s ease;
    }

    #lightbox img {
      display: block;
      max-width: 90%;
      max-height: 75vh;
      object-fit: contain;
      box-shadow: 0 0 50px rgba(0,0,0,1);
      transition: opacity 0.6s ease-in-out;
    }

    #lightbox-subtitle {
      position: absolute;
      bottom: 8%;
      width: 80%;
      max-width: 600px;
      text-align: center;
      font-size: 0.9rem;
      color: #f0f0f0;
      line-height: 1.6;
      letter-spacing: 2px;
      font-weight: 300;
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.3s ease;
      pointer-events: none;
    }

    .nav-btn.show {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-btn::after {
      content: '';
      width: 12px;
      height: 12px;
      border-top: 2px solid #fff;
      border-right: 2px solid #fff;
    }

    .btn-left { left: 20px; }
    .btn-left::after { transform: rotate(-135deg); margin-left: 4px; }

    .btn-right { right: 20px; }
    .btn-right::after { transform: rotate(45deg); margin-right: 4px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cinematicIn { from { opacity: 0; } to { opacity: 1; } }

    .footer-hint { text-align: center; font-size: 0.65rem; color: #222; padding: 60px 0 30px 0; letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="lightbox">
    <div class="nav-btn btn-left" id="prevBtn"></div>
    <div class="nav-btn btn-right" id="nextBtn"></div>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-subtitle"></div>
  </div>

  <div class="gallery-header">
    <div class="hero-title">WAYNE MANOR GALLERY</div>
    <div class="subtitle">活火山与霓虹彼岸 | Beta 0.52</div>
  </div>

  <div class="masonry-container" id="gallery"></div>
  <div class="footer-hint">Build with GitHub & Vercel | status: executing</div>

  <script>
    const galleryData = [
      { src: "images/Tokyo_Tower.webp", text: "所有的跋涉，都是为了抵达这个充满霓虹的彼岸。" },
      { src: "images/lone_tree_bromo.webp", text: "在世界的边缘，忍受极致的孤独与肃杀。" },
      { src: "images/Driver_Agung_bromo.webp", text: "在极端环境中，寻找真实的连接。" },
      { src: "images/DSC_3275.webp", text: "大阪列车站的虚影，都市跳动的脉搏。" },
      { src: "images/DSC_3393.webp", text: "京都二年坂，时间在这里沉淀出温度。" },
      { src: "images/Kelingking_Beach.webp", text: "海天一色的绝景，给人以呼吸感。" },
      { src: "images/DSC_4317.webp", text: "悬崖是陆地对海洋最后的试探，而海浪是时间留下的白边。在这里，连风都屏住了呼吸。" },
      { src: "images/DSC_4424.webp", text: "慕士塔格的冰川的温柔是默默地看着这颗星球的日落，用千万年的积雪，藏起所有凡人的秘密。" },
      { src: "images/Monkey_moment.webp", text: "快门按下的那一刻，不需要语言。在这个被框住的瞬间里，生灵的眼底藏着整个野性世界。" },
      { src: "images/DSC_3549.webp", text: "弧形的玻璃切开光影，像是在等一场新海诚式的阵雨。只要在这个坐标，现实和二次元就只隔着一杯咖啡的距离。" },
      { src: "images/DSC_3567.webp", text: "当暮色吞没东京湾，千万盏霓虹便开始窃窃私语。这是一座用钢铁和微光折叠起来的梦境迷宫。" },
      { src: "images/DSC_4125.webp", text: "引擎轰鸣在黑色的火山灰上，像是在另一颗荒芜行星上的流浪。浓雾尽头，是地心沉睡的巨兽。" },
      { src: "images/R0001257.webp", text: "诸神将未经打磨的钻石随手丢进深海，于是这片蔚蓝有了最锋利的形状。万物在这里，只剩下纯粹的蓝与白。" },
      { src: "images/DSC_1224.webp", text: "它踩着斑驳的光影巡视自己的领地。墙外是喧嚣的人间，墙上是只属于它的慵懒午后。" },
      { src: "images/DSC_3371.webp", text: "电线交织着京都的黄昏，灯笼正等待夜的降临。走在这条街上，一不小心就会踩到旧时光的倒影。" },
      { src: "images/DSC_3552.webp", text: "喧嚣与宁静，只隔着一条街道的距离。" },
      { src: "images/DSC_3635.webp", text: "一场跨越星辰的暗恋。地球在时间的流沙中，轻吻月球。那一抹血红，是宇宙深处最沉默的温柔。" }
    ];

    let currentIndex = 0;
    let touchstartX = 0;
    let startTime = 0;
    let isTransitioning = false;
    let hintTimer = null;

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxSubtitle = document.getElementById('lightbox-subtitle');
    const btns = document.querySelectorAll('.nav-btn');

    const updateLightbox = () => {
      const item = galleryData[currentIndex];
      lightboxImg.src = item.src;
      lightboxSubtitle.innerText = item.text;
      lightboxImg.style.opacity = '1';
      lightboxSubtitle.style.opacity = '1';
      flashBtns();
    };

    const flashBtns = () => {
      btns.forEach(b => b.classList.add('show'));
      if(hintTimer) clearTimeout(hintTimer);
      hintTimer = setTimeout(() => {
        btns.forEach(b => b.classList.remove('show'));
      }, 1000);
    };

    document.getElementById('gallery').append(...galleryData.map((item, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `<img src="${item.src}" alt="" loading="lazy"><div class="photo-desc">${item.text}</div>`;
      card.onclick = () => {
        currentIndex = i;
        updateLightbox();
        lightbox.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      };
      return card;
    }));

    async function slide(newIndex) {
      if (isTransitioning) return;
      isTransitioning = true;
      lightboxImg.style.opacity = '0';
      lightboxSubtitle.style.opacity = '0';
      await new Promise(r => setTimeout(r, 600));
      currentIndex = newIndex;
      updateLightbox();
      await new Promise(r => setTimeout(r, 600));
      isTransitioning = false;
    }

    const next = () => slide((currentIndex + 1) % galleryData.length);
    const prev = () => slide((currentIndex - 1 + galleryData.length) % galleryData.length);

    document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); next(); };
    document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); prev(); };

    lightbox.ontouchstart = (e) => { touchstartX = e.changedTouches[0].screenX; startTime = Date.now(); };
    lightbox.ontouchend = (e) => {
      let dx = e.changedTouches[0].screenX - touchstartX;
      if (Math.abs(dx) > 50) { dx < 0 ? next() : prev(); }
      else if (Date.now() - startTime < 300 && e.target === lightbox || e.target === lightboxImg) {
        lightbox.style.display = 'none'; document.body.style.overflow = '';
      }
    };

    window.onkeydown = (e) => {
      if (lightbox.style.display === 'flex') {
        if (e.key === 'ArrowRight') next();
        if (e.key === 'ArrowLeft') prev();
        if (e.key === 'Escape') { lightbox.style.display = 'none'; document.body.style.overflow = ''; }
      }
    };
  </script>
</body>
</html>

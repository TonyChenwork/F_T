<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  <title>Chenjt - Portfolio</title>
  <meta name="description" content="Chenjt's Personal Portfolio & Confessions.">

  <!-- 1. 样式表引用：确保路径正确 -->
  <link rel="icon" type="image/x-icon" href="dist/assets/logo.png" />
  <link rel="stylesheet" href="dist/output.css" />
  <link rel="stylesheet" href="style.css" />

<!-- 2. 内部化核心库：彻底免疫各种广告拦截器 -->
  <link rel="stylesheet" href="libs/fancybox.min.css" />
  <script src="libs/jquery.min.js"></script>
  <script src="libs/imagesloaded.pkgd.min.js"></script>
  <script src="libs/masonry.pkgd.min.js"></script>
  <script defer src="libs/alpine.min.js"></script>
  <script src="libs/fancybox.umd.min.js"></script>

  <!-- 3. 解决闪烁的 CSS 补丁 -->
  <style>
    [x-cloak] { display: none !important; }
  </style>

 <!-- ==========================================
       强行填平 iOS 灵动岛缝隙 & 强制纯黑背景
       ========================================== -->
  <style>
    /* 1. 将 Fancybox 的背景强制设为没有透明度的纯黑 */
    .fancybox__container {
      --f-bg: #000000 !important; 
    }
    
    /* 2. 让纯黑色的幕布强行向上、向下延伸，吃掉所有安全区缝隙，但不影响 X 按钮和箭头的正常位置 */
    .fancybox__backdrop {
      top: -50px !important;
      bottom: -50px !important;
      background: #000000 !important;
      opacity: 1 !important;
    }
    
    /* 3. 针对 iOS 专属的 dvh (动态视口高度) 优化，确保底部不穿帮 */
    .fancybox__carousel {
      height: 100dvh !important;
    }
  </style>

</head>

<style>
  /* 💡 核心：配合 x-cloak 彻底消灭微信二维码刷新时的闪现 */
  [x-cloak] { display: none !important; }
</style>

<body x-data="{ open: false, showWechat: false }" class="bg-black min-h-screen flex flex-col text-white px-5 md:px-20 transition duration-500">

  <!-- ==========================================
       Navbar (强制暗黑模式)
       ========================================== -->
  <header class="relative z-20 flex w-full pt-10 pb-1">
    <nav id="nav" role="navigation" class="w-full">
      <div class="container mx-auto flex flex-wrap items-center md:flex-no-wrap">
        
        <!-- CheN JT Logo (强制白色) -->
        <div class="mr-4 md:mr-8">
          <a href="index.html" class="text-2xl font-signika font-bold text-white">CheN JT</a>
        </div>

        <!-- 手机端汉堡按钮 (强制白色) -->
        <div class="ml-auto md:hidden flex items-center justify-start">
          <button @click="open = !open" 
            class="tap-highlight-transparent text-white w-5 h-5 relative focus:outline-none">
            <span class="sr-only">Open main menu</span>
            <div class="block w-5 absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2">
              <span aria-hidden="true"
                class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out"
                :class="{'rotate-45': open,' -translate-y-1.5': !open }"></span>
              <span aria-hidden="true"
                class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out"
                :class="{'opacity-0': open } "></span>
              <span aria-hidden="true"
                class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out"
                :class="{'-rotate-45': open, ' translate-y-1.5': !open}"></span>
            </div>
          </button>
        </div>

        <!-- 菜单容器 -->
        <div id="menu"
          class="grid w-full transition-all ease-out duration-500 md:transition-none md:w-auto md:flex-grow md:flex md:items-center md:justify-end"
          :class="open ? 'grid-rows-[1fr] opacity-100 mt-5' : 'grid-rows-[0fr] opacity-0 md:opacity-100 md:grid-rows-[1fr]'">
          
          <div class="overflow-hidden md:overflow-visible">
            <ul id="ulMenu" class="flex flex-col md:flex-row md:items-center md:mt-0 md:pt-0 md:border-0 md:space-x-5 transition-all duration-700 -translate-y-4 md:translate-y-0" :class="open ? 'translate-y-0' : '-translate-y-4 md:translate-y-0'">
              
              <!-- PORTFOLIO 按钮 -->
              <li class="group transition duration-300 py-2 md:py-0">
                <a href="index.html" class="font-signika text-2xl tap-highlight-transparent text-white">PORTFOLIO
                  <!-- 💡 下划线强制 bg-white -->
                  <span class="hidden md:block h-0.5 bg-white"></span>
                </a>
              </li>
              
              <!-- JOURNEY 按钮 -->
              <li class="group transition duration-300 py-2 md:py-0">
                <a href="dist/JOURNEY.html" class="font-signika text-2xl tap-highlight-transparent opacity-60 hover:opacity-100 text-white">JOURNEY
                  <!-- 💡 下划线强制 bg-white -->
                  <span class="hidden md:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-white"></span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- ==========================================
       Main Content (照片墙)
       ========================================== -->
  <main class="flex-grow pt-10">
    <div id="gallery-container" class="w-full mx-auto">
      <!-- gallery.js 会自动填充内容 -->
    </div>
  </main>

  <!-- ==========================================
       Footer (微信暗门)
       ========================================== -->
  <footer class="w-full relative z-20 border-t border-gray-900 mt-auto">
    <div class="max-w-4xl mx-auto px-5 py-8 flex flex-col md:flex-row items-center justify-between text-[10px] tracking-[0.2em] uppercase text-gray-600 font-serif">
      <div><p>© 2026 CheN JT. / All rights reserved.</p></div>
      <div class="flex items-center space-x-6 cursor-pointer">
        <a @click.prevent="showWechat = true" class="flex items-center space-x-1.5 cursor-pointer text-gray-500 hover:text-gray-300 transition-colors duration-300">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8.667 3.556c-4.118 0-7.444 2.766-7.444 6.166 0 1.944 1.056 3.667 2.667 4.778-.222.778-.722 2.222-.722 2.222s1.444-.333 2.389-.778c.944.278 2.056.444 3.111.444.111 0 .222 0 .333-.056-.056-.333-.111-.667-.111-1.056 0-3.944 3.722-7.111 8.167-7.111.222 0 .5.056.778.056-1.056-2.611-4.833-4.665-9.166-4.665zm-2.055 3.389c.444 0 .833.389.833.889s-.389.889-.833.889-.833-.389-.833-.889.389-.889.833-.889zm4.278 0c.444 0 .833.389.833.889s-.389.889-.833.889-.833-.389-.833-.889.389-.889.833-.889zm6.166 2.333c-3.667 0-6.611 2.389-6.611 5.389 0 2.945 2.944 5.389 6.611 5.389 1.056 0 2.056-.222 2.944-.556.889.444 2.167.722 2.167.722s-.444-1.278-.611-1.944c1.389-.945 2.167-2.333 2.167-3.834 0-3-2.889-5.166-6.667-5.166zm-1.833 2.333c.389 0 .667.278.667.667s-.278.667-.667.667-.667-.278-.667-.667.278-.667.667-.667zm3.833 0c.389 0 .667.278.667.667s-.278.667-.667.667-.667-.278-.667-.667.278-.667.667-.667z"/></svg>
          <span class="tracking-[0.2em] font-serif uppercase text-[10px]">MY_WECHAT</span>
        </a>
      </div>
    </div>

    <!-- 微信弹窗：挂上 x-cloak 杜绝闪现 -->
    <div x-show="showWechat" x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
      <div class="absolute inset-0" @click="showWechat = false"></div>
      <div class="relative z-10 p-4 bg-white rounded-lg shadow-2xl">
        <img src="https://chenjt-portfolio-1420941215.cos.ap-shanghai.myqcloud.com/images/weixin.webp" alt="QR" class="w-48 h-48 md:w-64 md:h-64 grayscale">
        <p class="text-center text-black text-[10px] mt-4 font-bold tracking-[0.2em]">SCAN TO CONNECT</p>
      </div>
    </div>
  </footer>

  <!-- 必要脚本 -->
  <script src="gallery.js" defer></script>
  <!-- ==========================================
       系统级手势拦截器 (终极防御：死锁双指扒拉放大)
       ========================================== -->
  <script>
    // 1. 禁用 iOS 的双指手势事件
    document.addEventListener('gesturestart', function (event) {
      event.preventDefault();
    });

    // 2. 核心防御：当手指在屏幕上移动时，只要检测到超过1个手指（双指拉伸），立刻切断！
    document.addEventListener('touchmove', function (event) {
      // event.scale 是 iOS 专属属性，代表缩放比例
      if (event.touches.length > 1 || (event.scale && event.scale !== 1)) {
        event.preventDefault();
      }
    }, { passive: false });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
